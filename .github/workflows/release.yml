name: "Publish Release"

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "ubuntu-22.04"
            args: ""
          - platform: "windows-latest"
            args: ""
          - platform: "macos-latest"
            args: "--target universal-apple-darwin"

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true

      - name: Add Rust targets for macOS Universal
        if: matrix.platform == 'macos-latest'
        run: |
          rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install WASM-Pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: "latest"

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build Crypto WASM
        run: pnpm build:wasm

      - name: Build and setup Sidecar (Linux / Windows)
        if: matrix.platform != 'macos-latest'
        run: |
          pnpm build:proxy
          pnpm copy:sidecar

      - name: Build and setup Sidecar (macOS Universal)
        if: matrix.platform == 'macos-latest'
        run: |
          cargo build --manifest-path packages/proxy/Cargo.toml --release --target aarch64-apple-darwin
          cargo build --manifest-path packages/proxy/Cargo.toml --release --target x86_64-apple-darwin
          mkdir -p packages/desktop/src-tauri/binaries
          cp target/aarch64-apple-darwin/release/secure-vault-manager-proxy packages/desktop/src-tauri/binaries/proxy-aarch64-apple-darwin
          cp target/x86_64-apple-darwin/release/secure-vault-manager-proxy packages/desktop/src-tauri/binaries/proxy-x86_64-apple-darwin
          lipo -create \
            target/aarch64-apple-darwin/release/secure-vault-manager-proxy \
            target/x86_64-apple-darwin/release/secure-vault-manager-proxy \
            -output packages/desktop/src-tauri/binaries/proxy-universal-apple-darwin

      - name: Build and Release Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: packages/desktop
          tagName: ${{ github.ref_name }}
          releaseName: "Secure Vault Manager ${{ github.ref_name }}"
          releaseBody: |
            Secure Vault Manager ${{ github.ref_name }} release builds.

            Multi-platform packages included:
            - **Linux**: `.deb`, `.rpm`, `.AppImage`
            - **Windows**: `.exe` (Installer)
            - **macOS**: `.dmg` Universal Binary (Apple Silicon & Intel)
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
